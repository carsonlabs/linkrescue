<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Lifebuoy ring (rescue element) -->
  <circle cx="256" cy="256" r="190" stroke="url(#ring)" stroke-width="28" fill="none" opacity="0.15"/>

  <!-- Left chain link -->
  <rect x="88" y="196" width="160" height="120" rx="60" ry="60"
        stroke="url(#grad1)" stroke-width="32" fill="none"/>

  <!-- Right chain link -->
  <rect x="264" y="196" width="160" height="120" rx="60" ry="60"
        stroke="url(#grad2)" stroke-width="32" fill="none"/>

  <!-- Rescue shield / check badge -->
  <circle cx="400" cy="148" r="52" fill="url(#ring)"/>
  <polyline points="376,148 394,166 424,132" stroke="#fff" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
