<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#2563EB" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B" />
      <stop offset="100%" style="stop-color:#EF4444" />
    </linearGradient>
  </defs>

  <!-- Icon: Left chain link -->
  <rect x="12" y="44" width="72" height="72" rx="36" ry="36"
        stroke="url(#g1)" stroke-width="16" fill="none"/>

  <!-- Icon: Right chain link -->
  <rect x="60" y="44" width="72" height="72" rx="36" ry="36"
        stroke="url(#g2)" stroke-width="16" fill="none"/>

  <!-- Rescue badge -->
  <circle cx="118" cy="42" r="24" fill="url(#badge)"/>
  <polyline points="107,42 114,49 129,33" stroke="#fff" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark -->
  <text x="158" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="64" font-weight="700" fill="#1E293B">
    Link<tspan fill="url(#g1)">Rescue</tspan>
  </text>
</svg>
