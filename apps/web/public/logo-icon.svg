<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
    <linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#2563EB" />
    </linearGradient>
    <linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B" />
      <stop offset="100%" style="stop-color:#EF4444" />
    </linearGradient>
  </defs>

  <!-- Left chain link -->
  <rect x="14" y="36" width="56" height="56" rx="28" ry="28"
        stroke="url(#a)" stroke-width="14" fill="none"/>

  <!-- Right chain link -->
  <rect x="58" y="36" width="56" height="56" rx="28" ry="28"
        stroke="url(#b)" stroke-width="14" fill="none"/>

  <!-- Rescue badge -->
  <circle cx="100" cy="32" r="20" fill="url(#c)"/>
  <polyline points="90,32 96,38 110,24" stroke="#fff" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
